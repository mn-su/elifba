  <path d="M105 622 C150 590 148 530 168 492 C200 430 244 382 316 344 C390 306 470 356 475 430 C482 520 424 545 505 592 C585 640 700 625 735 586 C790 526 800 455 846 421 C900 370 932 340 1016 346 C1100 354 1110 438 1068 426 C1005 408 996 520 1020 526 C1065 535 1010 590 1040 604 C1086 625 1118 632 1156 655"
        fill="none" stroke="#f3c777" stroke-width="14" stroke-linecap="round" stroke-dasharray="1 36" opacity="0.72"/>

  <!-- Subtle pads under dynamic HTML buttons. These are not interactive; they help visually anchor nodes to the road. -->
