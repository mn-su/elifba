    <circle cx="846" cy="421" r="37"/><circle cx="922" cy="352" r="37"/><circle cx="1016" cy="346" r="37"/><circle cx="1068" cy="426" r="37"/>
    <circle cx="1020" cy="526" r="37"/><circle cx="1040" cy="604" r="37"/><circle cx="1110" cy="632" r="37"/><circle cx="1156" cy="655" r="37"/>
